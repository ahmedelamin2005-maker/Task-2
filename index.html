<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Order Summary Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card-container">
    
    <header class="card-hero">
      <img src="./images/illustration-hero.svg" alt="Hero Illustration">
    </header>

    <section class="card-content">
      <h1 class="card-title">Order Summary</h1>
      
      <p class="card-description">
        You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!
      </p>

      <article class="plan-selector">
        <div class="plan-details">
          <img src="./images/icon-music.svg" alt="Music Icon" aria-hidden="true">
          <div class="plan-text">
            <span class="plan-name">Annual Plan</span>
            <span class="plan-price">$59.99/year</span>
          </div>
        </div>
        
        <a href="#" class="plan-change-link">Change</a>
      </article>

      <div class="card-actions">
        <button class="btn-primary">Proceed to Payment</button>
        <a href="#" class="btn-secondary">Cancel Order</a>
      </div>
      
    </section>
  </main>

</body>
</html>
